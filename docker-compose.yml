services:
  db:
    image: postgres:16-alpine
    container_name: aethera_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: aethera
      POSTGRES_PASSWORD: aethera_dev_password
      POSTGRES_DB: aethera
    ports:
      - "5432:5432"
    volumes:
      - aethera_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aethera -d aethera"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: aethera_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@aethera.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    profiles:
      - tools

volumes:
  aethera_postgres_data:
