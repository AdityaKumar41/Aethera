services:
  - type: web
    name: aethera-api
    runtime: node
    region: oregon
    plan: starter
    rootDir: .
    buildCommand: pnpm install && pnpm turbo build --filter=@aethera/api
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health
    # Run DB migrations just before each new deployment goes live
    preDeployCommand: pnpm --filter @aethera/database db:migrate:deploy
    envVars:
      - key: NODE_ENV
        value: production

      # ── Database ────────────────────────────────────────────────────────
      # PostgreSQL connection string (add ?schema=public if using Supabase)
      - key: DATABASE_URL
        sync: false

      # ── Clerk Auth ───────────────────────────────────────────────────────
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false

      # ── Stellar / Blockchain ─────────────────────────────────────────────
      # TESTNET or MAINNET
      - key: STELLAR_NETWORK
        value: testnet
      # Legacy plain relayer/admin Stellar secret used by older services
      - key: STAT_RELAYER_SECRET
        sync: false
      # Encryption passphrase for wallet operations
      - key: WALLET_ENCRYPTION_SECRET
        sync: false
      # Legacy encryption key still used by some existing wallet flows
      - key: STELLAR_SECRET_ENCRYPTION_KEY
        sync: false
      # Public key for the encrypted admin relayer wallet
      - key: ADMIN_RELAYER_PUBLIC_KEY
        sync: false
      # Encrypted admin relayer secret for project activation (capital release)
      - key: ADMIN_RELAYER_SECRET_ENCRYPTED
        sync: false
      # Canonical Stellar USDC token contract used by investments/funding
      - key: USDC_CONTRACT_ID
        sync: false
      # Treasury contract that escrows project funds and mints project tokens
      - key: TREASURY_CONTRACT_ID
        sync: false
      - key: ASSET_TOKEN_CONTRACT_ID
        sync: false
      - key: YIELD_DISTRIBUTOR_CONTRACT_ID
        sync: false
      - key: GOVERNANCE_CONTRACT_ID
        sync: false
      - key: ORACLE_CONTRACT_ID
        sync: false

      # ── CORS ─────────────────────────────────────────────────────────────
      # Comma-separated list of allowed frontend origins
      # e.g. https://your-frontend.vercel.app,https://yourdomain.com
      - key: FRONTEND_URL
        sync: false

      # ── KYC (optional — omit if not using Sumsub) ────────────────────────
      - key: SUMSUB_APP_TOKEN
        sync: false
      - key: SUMSUB_SECRET_KEY
        sync: false

      # ── Misc ─────────────────────────────────────────────────────────────
      # Set to "true" to bypass KYC checks in production (NOT recommended)
      - key: MOCK_KYC
        value: "false"
      # Set to "true" to skip startup env validation (NOT recommended)
      - key: SKIP_ENV_VALIDATION
        value: "false"
